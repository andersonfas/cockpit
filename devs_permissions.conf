#!/usr/bin/env bash
#===============================================================================
#
#          ARQUIVO: devs_permissions.conf
#
#         DESCRIÇÃO: Configuração do DevOps Permissions Manager
#                    Arquivo de configuração central para gestão de permissões
#
#          VERSÃO: 5.1.0
#      ATUALIZADO: 2026-03-20
#
#       LOCALIZAÇÃO: /etc/devs-permissions/devs_permissions.conf
#
#===============================================================================

#===============================================================================
#                              ORGANIZAÇÃO
#===============================================================================

# Nome da organização (exibido no dashboard, logs e relatórios)
ORG_NAME="My Organization"

#===============================================================================
#                              AMBIENTE
#===============================================================================
# development - Menos restrições, acesso mais livre (max 48h temp access)
# staging     - Restrições moderadas (max 12h temp access)
# production  - Máxima restrição (max 4h temp access)

ENVIRONMENT="production"

#===============================================================================
#                              GRUPOS
#===============================================================================

# Grupo com acesso BÁSICO (docker ps, logs, inspect, stats, images)
GRUPO_DEV="devs"

# Grupo com acesso AVANÇADO (docker exec - entrar no container)
GRUPO_DEV_EXEC="devs_exec"

# Grupo com acesso WEBCONF (editar nginx/httpd configs e reload)
GRUPO_DEV_WEBCONF="devs_webconf"

#===============================================================================
#                       COMPORTAMENTO AUTOMÁTICO
#===============================================================================

# Criar usuários automaticamente se não existirem
AUTO_CREATE_USERS=true

# Criar grupos automaticamente se não existirem
AUTO_CREATE_GROUPS=true

# Shell padrão para novos usuários
DEFAULT_SHELL="/bin/bash"

#===============================================================================
#                       CONTROLE DE HORÁRIO
#===============================================================================

# Habilitar restrição de horário (true/false)
ACCESS_HOURS_ENABLED=false

# Horário permitido (formato HH:MM)
ACCESS_HOURS_START="08:00"
ACCESS_HOURS_END="20:00"

# Bloquear acesso nos fins de semana
ACCESS_HOURS_WEEKDAYS_ONLY=true

#===============================================================================
#                       CONTROLE POR AMBIENTE
#===============================================================================

# Em produção, exec requer aprovação ou acesso temporário válido
PROD_REQUIRES_APPROVAL=true

# Máximo de horas para acesso temporário por ambiente
PROD_MAX_TEMP_HOURS=4
STAGING_MAX_TEMP_HOURS=12
DEV_MAX_TEMP_HOURS=48
MAX_TEMP_HOURS=24

#===============================================================================
#                       INATIVIDADE
#===============================================================================

# Dias sem atividade para considerar usuário inativo
INACTIVITY_DAYS=30

# Revogar automaticamente acesso exec de usuários inativos
AUTO_REVOKE_INACTIVE=false

#===============================================================================
#                       LIMITES
#===============================================================================

# Máximo de sessões simultâneas por usuário
MAX_CONCURRENT_SESSIONS=3

#===============================================================================
#                    USUÁRIOS - NÍVEL BÁSICO
#===============================================================================
# Acesso de LEITURA: docker ps, logs, inspect, stats, images
#
# O script criará automaticamente usuários que não existem!
# Basta adicionar o nome aqui e executar: devs-permissions apply

USUARIOS=(
    # Adicione seus usuários aqui:
    # "john.doe"
    # "jane.smith"
)

#===============================================================================
#                    USUÁRIOS - NÍVEL AVANÇADO (EXEC)
#===============================================================================
# Podem ENTRAR nos containers (docker exec)
#
# ⚠️  Em ambiente PRODUCTION com PROD_REQUIRES_APPROVAL=true:
#     Estes usuários podem usar exec diretamente.
#     Outros precisam solicitar via: request --user X --hours N --reason "motivo"

USUARIOS_EXEC=(
    # Líderes técnicos, DevOps seniors
    # "john.doe"
)

#===============================================================================
#                    USUÁRIOS - NÍVEL WEBCONF
#===============================================================================
# Podem EDITAR configurações do Nginx/Apache e fazer RELOAD dos serviços

USUARIOS_WEBCONF=(
    # DevOps e desenvolvedores que precisam configurar vhosts, proxies
    # "john.doe"
)

#===============================================================================
#                    TIMES / PROJETOS - RESTRIÇÃO POR CONTAINER
#===============================================================================
#
# Esta seção permite restringir quais containers cada desenvolvedor pode acessar.
# Cada time define um padrão de nome de container e os usuários que pertencem a ele.
#
# IMPORTANTE:
#   - Usuários em um time SÓ podem acessar containers que correspondem ao padrão
#   - Usuários em um time SÓ podem editar arquivos .conf que correspondem ao padrão
#   - Usuários NÃO listados em nenhum time podem acessar TODOS os containers/configs
#   - Comandos gerais (docker ps, images, info) NÃO são restringidos
#   - Comandos específicos (logs, exec, inspect, restart) SÃO restringidos
#
#===============================================================================

# Habilitar restrição por time (true/false)
# Se false, todos os usuários podem acessar todos os containers
TEAM_RESTRICTION_ENABLED=false

# Lista de times ativos (DEVE corresponder aos arrays abaixo)
TEAMS=(
    # "BACKEND"
    # "FRONTEND"
)

# ---- Exemplo de configuração de time ----
# TEAM_BACKEND_USERS=(
#     "john.doe"
#     "jane.smith"
# )
# TEAM_BACKEND_CONTAINERS=(
#     "backend-*"
#     "api-*"
# )
# TEAM_BACKEND_WEBCONF_PATTERNS=(
#     "backend-*"
#     "api-*"
# )

#===============================================================================
#                    DIRETÓRIOS DE LOG PERMITIDOS
#===============================================================================
# Diretórios onde os desenvolvedores podem ler logs via sudo

LOG_DIRS_ALLOWED=(
    "/var/log/nginx"
    "/var/log/httpd"
    "/var/log/tomcat"
    "/var/log/apache2"
    # "/var/log/myapp"
)

#===============================================================================
#                    CONFIGURAÇÃO WEBCONF
#===============================================================================

# Diretórios onde o grupo webconf pode editar arquivos .conf
WEBCONF_DIRS_ALLOWED=(
    "/etc/nginx/conf.d"
    "/etc/httpd/conf.d"
    # "/etc/nginx/sites-available"
)

# Serviços que podem ser recarregados (reload, NÃO restart)
WEBCONF_SERVICES_ALLOWED=(
    "nginx"
    "httpd"
)

#===============================================================================
#                    CONFIGURAÇÃO DO DOCKER EXEC
#===============================================================================

# Comandos permitidos dentro do docker exec (para TODOS os usuários)
DOCKER_EXEC_COMMANDS_ALLOWED=(
    "/bin/bash"
    "/bin/sh"
    "bash"
    "sh"
)

#===============================================================================
#                    PADRÕES DE COMANDOS DOCKER PERMITIDOS
#===============================================================================
# Use {CONTAINER} como placeholder para o nome do container

# Padrões de docker logs permitidos
DOCKER_LOGS_PATTERNS=(
    "logs {CONTAINER}"
    "logs -f {CONTAINER}"
    "logs --follow {CONTAINER}"
    "logs --tail * {CONTAINER}"
    "logs -n * {CONTAINER}"
    "logs -f --tail * {CONTAINER}"
    "logs --follow --tail * {CONTAINER}"
    "logs -f -n * {CONTAINER}"
    "logs --follow -n * {CONTAINER}"
    "logs -fn* {CONTAINER}"
    "logs -nf* {CONTAINER}"
    "logs --since * {CONTAINER}"
    "logs --until * {CONTAINER}"
    "logs -f --since * {CONTAINER}"
    "logs --follow --since * {CONTAINER}"
    "logs -t {CONTAINER}"
    "logs --timestamps {CONTAINER}"
    "logs -ft {CONTAINER}"
    "logs -tf {CONTAINER}"
    "logs -f -t {CONTAINER}"
    "logs --follow --timestamps {CONTAINER}"
    "logs -ft --tail * {CONTAINER}"
    "logs -tf --tail * {CONTAINER}"
    "logs --timestamps --tail * {CONTAINER}"
    "logs -ftn* {CONTAINER}"
    "logs -tfn* {CONTAINER}"
)

# Padrões de outros comandos docker permitidos (por container)
DOCKER_CONTAINER_PATTERNS=(
    "inspect {CONTAINER}"
    "top {CONTAINER}"
    "stats {CONTAINER}"
    "stats --no-stream {CONTAINER}"
    "restart {CONTAINER}"
    "stop {CONTAINER}"
    "start {CONTAINER}"
)

# Comandos BLOQUEADOS por segurança (o wrapper bloqueia estes)
BLOCKED_COMMANDS=(
    "rm -rf /"
    "rm -rf /*"
    "dd if=/dev"
    "mkfs"
    "> /dev/sd"
    "chmod 777 /"
    "chmod -R 777 /"
)

#===============================================================================
#                         NOTIFICAÇÕES
#===============================================================================

# URL do Webhook (Slack, Teams ou Discord)
# Deixe vazio para desabilitar notificações
WEBHOOK_URL=""
# WEBHOOK_URL="https://hooks.slack.com/services/xxx/yyy/zzz"

# Tipo do webhook: slack, teams, discord
WEBHOOK_TYPE="slack"

# Quando notificar:
NOTIFY_ON_EXEC=true          # Quando alguém usa docker exec
NOTIFY_ON_TEMP_ACCESS=true   # Quando acesso temporário é concedido/revogado
NOTIFY_ON_REQUEST=true       # Quando há nova solicitação de acesso
NOTIFY_ON_SUSPICIOUS=true    # Quando ação suspeita é detectada

# Email para relatórios (opcional, requer mailx configurado)
REPORT_EMAIL=""

#===============================================================================
#                         CAMINHOS DE ARQUIVOS
#===============================================================================
# Normalmente não é necessário alterar estas configurações

SUDO_FILE="/etc/sudoers.d/devs_permissoes"
BACKUP_DIR="/var/backups/devs_permissions"
LOG_FILE="/var/log/devs_permissions_manager.log"
AUDIT_LOG_DIR="/var/log/devs_audit"
SESSION_LOG_DIR="/var/log/devs_audit/sessions"
TEMP_ACCESS_DIR="/var/lib/devs_permissions/temp_access"
REQUESTS_DIR="/var/lib/devs_permissions/requests"
DOCKER_WRAPPER_PATH="/usr/local/bin/docker-devs"
CRON_FILE="/etc/cron.d/devs_permissions_jobs"

#===============================================================================
#                         FIM DA CONFIGURAÇÃO
#===============================================================================
#
# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                         NÍVEIS DE ACESSO                                   ║
# ╠════════════════════════════════════════════════════════════════════════════╣
# ║                                                                            ║
# ║  BÁSICO (devs):                                                            ║
# ║    - docker ps, logs, inspect, stats, images                               ║
# ║    - Leitura de logs em /var/log/nginx, /var/log/httpd, etc.               ║
# ║    - Se estiver em um TIME, só acessa containers do time                   ║
# ║                                                                            ║
# ║  EXEC (devs_exec):                                                         ║
# ║    - Tudo do básico +                                                      ║
# ║    - docker exec -it container bash/sh                                     ║
# ║    - Se estiver em um TIME, só faz exec nos containers do time             ║
# ║                                                                            ║
# ║  WEBCONF (devs_webconf):                                                   ║
# ║    - Tudo do básico +                                                      ║
# ║    - Editar /etc/nginx/conf.d/*.conf                                       ║
# ║    - Editar /etc/httpd/conf.d/*.conf                                       ║
# ║    - nginx -t / httpd -t (testar config)                                   ║
# ║    - systemctl reload nginx/httpd                                          ║
# ║                                                                            ║
# ╚════════════════════════════════════════════════════════════════════════════╝
#
# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                         COMANDOS ÚTEIS                                     ║
# ╠════════════════════════════════════════════════════════════════════════════╣
# ║                                                                            ║
# ║  # Setup inicial                                                           ║
# ║  sudo devs-permissions apply                                               ║
# ║                                                                            ║
# ║  # Dashboard rápido                                                        ║
# ║  sudo devs-permissions dashboard                                           ║
# ║                                                                            ║
# ║  # Ver usuários e seus times                                               ║
# ║  sudo devs-permissions list-users                                          ║
# ║                                                                            ║
# ║  # Adicionar usuário                                                       ║
# ║  sudo devs-permissions add-user --user john.doe                            ║
# ║  sudo devs-permissions add-user --user john.doe --exec                     ║
# ║  sudo devs-permissions add-user --user john.doe --webconf                  ║
# ║                                                                            ║
# ║  # Acesso temporário com motivo (auditoria)                                ║
# ║  sudo devs-permissions grant-temp --user john --hours 4 --reason "debug"   ║
# ║                                                                            ║
# ╚════════════════════════════════════════════════════════════════════════════╝
#
# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                    COMO ADICIONAR NOVOS TIMES                              ║
# ╠════════════════════════════════════════════════════════════════════════════╣
# ║                                                                            ║
# ║  1. Adicione o nome do time ao array TEAMS:                                ║
# ║     TEAMS=( ... "NEWTEAM" )                                                ║
# ║                                                                            ║
# ║  2. Crie os arrays de usuários e containers:                               ║
# ║     TEAM_NEWTEAM_USERS=("user1" "user2")                                   ║
# ║     TEAM_NEWTEAM_CONTAINERS=("newteam-*" "nt-*")                           ║
# ║                                                                            ║
# ║  3. Execute:                                                               ║
# ║     sudo devs-permissions apply                                            ║
# ║                                                                            ║
# ╚════════════════════════════════════════════════════════════════════════════╝
#===============================================================================
